# MuralPicta WallPanel Server – Docker Compose (Developer / Generic)
#
# QUICK START (generic Linux / macOS / Windows with shell access):
#   1. Copy .env.example to .env and adjust MEDIA_PATH, PUID, PGID
#   2. docker compose up -d
#   3. Open: http://localhost:3000/admin
#
# For Synology NAS (Container Manager), use docker-compose.synology.yml instead.

services:
  wallpanel:
    # Option A: Build locally (developers)
    build:
      context: ..
      dockerfile: docker/Dockerfile

    # Option B: Use pre-built image from Docker Hub (end users)
    # image: galseq/mural-picta:latest

    container_name: MuralPicta

    # Run the container with the same UID/GID as your host user.
    # Find your values by running: id
    # Example output: uid=1026(youruser) gid=100(users)
    # → user: "1026:100"
    user: "${PUID:-1026}:${PGID:-100}"

    restart: on-failure:5

    ports:
      - "${PORT:-3000}:3000"

    volumes:
      # --- Config (bind-mount: directly visible and editable on the host) ---
      # Advantage: easy PIN reset, backup, direct editing without Docker overhead.
      # The folder must exist before starting: mkdir -p /volume1/docker/muralpicta/config
      - /volume1/docker/muralpicta/config:/app/config:rw

      # -------------------------------------------------------
      # MEDIA FOLDER – adjust the left path:
      # -------------------------------------------------------
      # Single folder (recommended for getting started):
      - /volume1/medien:/data/media:ro

      # Multiple folders mounted side by side:
      # - /volume1/photos:/data/media/photos:ro
      # - /volume1/videos:/data/media/videos:ro

      # Year-based subfolders:
      # - /volume1/medien/2024:/data/media/2024:ro
      # - /volume1/medien/2025:/data/media/2025:ro
      # - /volume1/medien/2026:/data/media/2026:ro

      # After starting, set "media_base_path" to /data/media in the admin.
      # -------------------------------------------------------

    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Europe/Berlin

    mem_limit: 512m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
