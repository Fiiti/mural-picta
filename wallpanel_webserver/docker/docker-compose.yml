# MuralPicta WallPanel Server – Docker Compose (Synology-kompatibel)
#
# SCHNELLSTART SYNOLOGY:
#   1. Erstelle auf der Synology den Ordner /volume1/docker/muralpicta/config
#   2. Passe PUID/PGID auf deine Synology-Werte an (ermitteln mit: id)
#      Typisch: uid=1026(deinUser) gid=100(users)
#   3. Passe den Medienpfad unter volumes an
#   4. docker compose up -d
#   5. Admin-Oberfläche: http://synology-ip:3000/admin

services:
  wallpanel:
    # Option A: Lokal bauen (Entwickler)
    build:
      context: ..
      dockerfile: docker/Dockerfile

    # Option B: Fertiges Image von Docker Hub (Endnutzer)
    # image: galseq/mural-picta:latest

    container_name: MuralPicta

    # Synology-User: Container läuft mit denselben Rechten wie dein NAS-User.
    # Ermittle deine Werte mit dem Synology Aufgabenplaner → Befehl: id
    # Beispiel-Ausgabe: uid=1026(galmi) gid=100(users)
    # → user: "1026:100"
    user: "${PUID:-1026}:${PGID:-100}"

    restart: on-failure:5

    ports:
      - "${PORT:-3000}:3000"

    volumes:
      # --- Konfiguration (Bind-Mount: direkt auf dem NAS sichtbar und editierbar) ---
      # Vorteil: PIN zurücksetzen, Backup, direkte Bearbeitung ohne Docker-Umweg
      # Ordner muss vorher existieren: mkdir -p /volume1/docker/muralpicta/config
      - /volume1/docker/muralpicta/config:/app/config:rw

      # -------------------------------------------------------
      # MEDIENORDNER – passe den Pfad links an:
      # -------------------------------------------------------
      # Einzelner Ordner (empfohlen für den Einstieg):
      - /volume1/medien:/data/media:ro

      # Mehrere Ordner parallel (alle erscheinen unter /data/media/...):
      # - /volume1/fotos:/data/media/fotos:ro
      # - /volume1/videos:/data/media/videos:ro

      # Jahres-Ordner:
      # - /volume1/medien/2024:/data/media/2024:ro
      # - /volume1/medien/2025:/data/media/2025:ro
      # - /volume1/medien/2026:/data/media/2026:ro

      # Nach dem Start in Admin → "Media Source" eintragen:
      #   media_base_path = /data/media
      # -------------------------------------------------------

    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Europe/Berlin

    mem_limit: 512m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
