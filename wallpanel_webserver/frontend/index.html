<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MuralPicta</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Medien-Slots für Crossfade -->
    <div id="slot-a" class="media-slot"></div>
    <div id="slot-b" class="media-slot"></div>

    <!-- Fortschrittsbalken -->
    <div id="progress-bar"></div>

    <!-- Debug-Overlay (nur wenn debug_mode aktiv) -->
    <div id="debug-overlay" style="display:none"></div>

    <!-- Ladebildschirm -->
    <div id="loading">Lädt Medienliste...</div>
  </div>

  <!-- exifr: EXIF-Auslesen inkl. GPS (lokal aus node_modules, UMD stellt window.exifr bereit) -->
  <script src="/vendor/exifr.js"></script>
  <script src="template.js"></script>
  <script src="exif.js"></script>
  <script src="kenburns.js"></script>
  <script src="slideshow.js"></script>
</body>
</html>
